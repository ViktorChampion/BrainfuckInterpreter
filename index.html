<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainfuck Visualizer</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #252538;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --active-color: #f38ba8;
            --border-color: #45475a;
            --highlight-color: #f9e2af;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--accent-color); }

        button.lang-btn {
            background: var(--border-color);
            color: var(--text-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .tape-container {
            overflow-x: auto;
            background: #181825;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .tape {
            display: flex;
            gap: 8px;
            position: relative;
            padding-bottom: 25px;
            padding-top: 30px;
        }

        .cell {
            min-width: 55px;
            height: 65px;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .cell.active {
            border-color: var(--active-color);
            box-shadow: 0 0 10px rgba(243, 139, 168, 0.5);
        }

        .cell-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 6px;
            font-size: 9px;
            color: #6c7086;
            position: absolute;
            top: 2px;
            left: 0;
            box-sizing: border-box;
        }

        .cell-index {
            font-weight: bold;
        }

        .cell-ascii {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 10px;
            background: rgba(137, 180, 250, 0.1);
            padding: 0 4px;
            border-radius: 3px;
            max-width: 25px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cell-ascii.non-printable {
            color: #f9e2af;
            background: rgba(249, 226, 175, 0.15);
        }

        .cell-value {
            font-weight: bold;
            margin-top: 12px;
            font-size: 16px;
        }

        .pointer-arrow {
            position: absolute;
            bottom: -2px;
            font-size: 20px;
            color: var(--active-color);
            transition: left 0.2s ease;
            transform: translateX(-50%);
            z-index: 5;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .code-container {
            position: relative;
            background: #181825;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .code-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: transparent;
            color: var(--text-color);
            border: none;
            padding: 10px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            resize: vertical;
            outline: none;
            position: relative;
            z-index: 1;
            line-height: 1.5;
        }

        .code-highlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            padding: 10px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: transparent;
            overflow: hidden;
        }

        .code-highlight .highlight-char {
            background: rgba(249, 226, 175, 0.3);
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(249, 226, 175, 0.2);
            display: inline;
            padding: 0;
            position: relative;
        }

        .code-highlight .highlight-char::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--highlight-color);
            border-radius: 2px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-run { background: #a6e3a1; color: #11111b; }
        .btn-stop { background: #f38ba8; color: #11111b; }
        .btn-step { background: #89b4fa; color: #11111b; }
        .btn-wait { background: #f9e2af; color: #11111b; }
        
        .btn:disabled {
            background: #585b70;
            color: #a6adc8;
            cursor: not-allowed;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #181825;
            padding: 5px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .io-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .io-field {
            display: flex;
            flex-direction: column;
        }
        .io-field label {
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .io-field textarea {
            width: 100%;
            height: 80px;
            background: #181825;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        .io-field textarea:focus {
            border-color: var(--accent-color);
        }

        .hints {
            background: #181825;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .hints h3 { margin-top: 0; color: var(--accent-color); }

        .hint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            font-size: 14px;
        }

        .hint-item code {
            background: var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--active-color);
            font-weight: bold;
        }

        .ascii-group {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .ascii-group-header {
            background: #2a2a3f;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .ascii-group-header:hover {
            background: #313149;
        }

        .ascii-group-content {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 6px;
            padding: 12px;
            background: #14141f;
            border-top: 1px solid var(--border-color);
        }

        .ascii-group.open .ascii-group-content {
            display: grid;
        }

        .ascii-item {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px;
            text-align: center;
            font-size: 13px;
        }

        .ascii-code {
            color: #6c7086;
            font-size: 11px;
            display: block;
        }

        .ascii-char {
            font-weight: bold;
            color: var(--active-color);
            font-family: monospace;
            font-size: 15px;
        }

        .execution-status {
            display: none;
            color: var(--accent-color);
            font-size: 14px;
            margin-left: 10px;
            font-weight: bold;
        }
        .execution-status.active {
            display: inline;
        }

        .current-command-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #181825;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        .current-command-info .cmd-char {
            color: var(--active-color);
            font-weight: bold;
            font-size: 18px;
            background: rgba(243, 139, 168, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .current-command-info .cmd-index {
            color: #6c7086;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="title">Brainfuck Visualizer</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <!-- Новый селектор режима памяти -->
            <select id="memoryModeSelect" onchange="updateMemoryMode()" style="background: var(--border-color); color: var(--text-color); border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; outline: none;">
                <option value="bounded" id="optBounded">Bounded</option>
                <option value="wrap" id="optWrap">Wrap-around</option>
            </select>
            <select id="exampleSelect" onchange="loadExample()" style="background: var(--border-color); color: var(--text-color); border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; outline: none;">
            </select>
            <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">RU</button>
        </div>
    </header>

    <div class="tape-container">
        <div class="tape" id="tape"></div>
    </div>

    <div class="workspace">
        <div class="code-container">
            <div class="code-wrapper">
                <textarea id="code" placeholder="Введите Brainfuck код сюда..." onscroll="syncHighlightScroll()" oninput="updateCodeHighlight()"></textarea>
                <div class="code-highlight" id="codeHighlight"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-run" id="btnRun" onclick="runCode()">Run</button>
        <button class="btn btn-wait" id="btnWait" onclick="waitCode()" disabled>Wait</button>
        <button class="btn btn-run" id="btnContinue" onclick="continueCode()" disabled>Continue</button>
        <button class="btn btn-step" id="btnStepFwd" onclick="stepForward()">+ Step</button>
        <button class="btn btn-step" id="btnStepBwd" onclick="stepBackward()" disabled>- Step</button>
        <button class="btn btn-stop" id="btnStop" onclick="stopCode()">Stop</button>
        <button class="btn" id="btnClear" onclick="clearAll()" style="background: #45475a; color: var(--text-color);">Clear</button>
        <!-- Новый блок настройки размера ленты -->
        <div class="speed-control">
            <span id="labelSpeed">Скорость:</span>
            <input type="range" id="speed" min="0" max="10" value="5" onchange="updateSpeed()">
            <span id="speedVal">5</span>
        </div>
        <span class="execution-status" id="execStatus">⏳ Выполнение...</span>
        <div class="speed-control" style="gap: 5px;">
            <span id="labelTapeSize">Ячеек:</span>
            <input type="number" id="tapeSizeInput" value="1000" min="1" max="30000" style="width: 60px; background: var(--panel-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px; outline: none; font-weight: bold; text-align: center;">
            <button class="btn" id="btnResizeTape" onclick="resizeTape()" style="padding: 4px 10px; font-size: 13px; background: var(--accent-color); color: #11111b; border-radius: 4px;">OK</button>
        </div>
        <div class="current-command-info" id="commandInfo">
            <span class="cmd-index" id="cmdIndex">—</span>
            <span class="cmd-char" id="cmdChar">␣</span>
            <span style="color: #6c7086; font-size: 12px;" id="cmdDesc">ожидание</span>
        </div>
    </div>

    <div class="io-panel">
        <div class="io-field">
            <label id="labelInput">Ввод (для команды ','):</label>
            <textarea id="inputBuffer" placeholder="Символы для команды ','"></textarea>
        </div>
        <div class="io-field">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label id="labelOutput" style="margin-bottom: 0;">Вывод:</label>
                <button id="btnCopy" onclick="copyOutput()" style="background: var(--border-color); color: var(--text-color); border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; transition: background 0.2s;">Copy</button>
            </div>
            <textarea id="output" readonly></textarea>
        </div>
    </div>

    <div class="hints">
        <h3 id="hintsTitle">Справка по командам</h3>
        <div class="hint-grid" id="hintGrid"></div>
    </div>
</div>

<div class="hints" style="margin-top: 20px; max-width: 900px; width: 100%; box-sizing: border-box;">
    <h3 id="asciiTitle">Таблица ASCII (0-127)</h3>
    <div id="asciiContainer"></div>
</div>

            hints: [

                { cmd: '+', desc: 'Увеличить значение в ячейке' },
                { cmd: '-', desc: 'Уменьшить значение в ячейке' },

                { cmd: '[', desc: 'Перейти вперёд за ] если в ячейке 0' },

            ],
            optBounded: "Ограниченная (Фиксация)",
            optWrap: "Закольцованная (Цикл)",

        }
    };
    function updateMemoryMode() {
        memoryMode = document.getElementById('memoryModeSelect').value;
    }
    function resizeTape() {
        const inputEl = document.getElementById('tapeSizeInput');
        let newSize = parseInt(inputEl.value);

        // Простая валидация диапазона (можно настроить под себя)
        if (isNaN(newSize) || newSize < 10) {
            newSize = 10;
        } else if (newSize > 30000) {
            newSize = 30000; // Ограничим верхнюю планку для стабильности DOM
        }
        inputEl.value = newSize;

        // Останавливаем выполнение, если программа была запущена
        stopCode();

        // Обновляем размер и выделяем новый массив памяти
        TAPE_SIZE = newSize;
        memory = new Array(TAPE_SIZE).fill(0);
        ptr = 0;
        history = [];

        // Пересоздаем ячейки в интерфейсе
        initTape();
        updateUI();
    }

    // === СОСТОЯНИЕ ===
    let TAPE_SIZE = 1000;
    let memory = new Array(TAPE_SIZE).fill(0);
    let memoryMode = "bounded";
    let ptr = 0;
    let codeIndex = 0;
    let rawCodeIndex = -1;
    let isRunning = false;
    let isPaused = false;
    let isStopped = false;
    let timer = null;
    let inputIndex = 0;

    let cleanCode = "";
    let mapToRawIndex = [];
    let history = [];

    const nonPrintableNames = {
        0: 'NUL', 1: 'SOH', 2: 'STX', 3: 'ETX', 4: 'EOT', 5: 'ENQ', 6: 'ACK',
        7: 'BEL', 8: 'BS', 9: 'TAB', 10: 'LF', 11: 'VT', 12: 'FF', 13: 'CR',
        14: 'SO', 15: 'SI', 16: 'DLE', 17: 'DC1', 18: 'DC2', 19: 'DC3', 20: 'DC4',
        21: 'NAK', 22: 'SYN', 23: 'ETB', 24: 'CAN', 25: 'EM', 26: 'SUB', 27: 'ESC',
        28: 'FS', 29: 'GS', 30: 'RS', 31: 'US', 32: 'SP', 127: 'DEL'

            code: "+        adds 1 to enter the loop\n[>,]     reads all characters and writes them into cells\n<[-<]    subtracts 1 from all cells to get rid of cell 0\n>[+..>]  adds 1, prints 2 times and moves on",

        },

            code: "++++++++++[->++++++++++<]>++++.<+++[->++++<]>..----.+++.<+++[->-------------------<]>.-----------..<+++++++[->++++++++++<]>+.-------------.++.+++++++++.-----.+++.<+++[->-----<]>.+++++.-------.++++++++++++.+++.-------.++++++.-.<++++++++[->--------<]>.>++++++++++[->++++++++++<]>+++.++.+++++++++++.------------.+++++++++++++.<+++++[->----<]>+.<<.>>+++++++.++++++.<<+.>+++++[->---------<]>.<++++++[->++++++++<]>.<+++++[->---<]>--.++++++++.+++++.--------.<+++++[->+++<]>.<++++++[->---<]>.++++++++.<+++++++++++++++++[->--<]>.<++++++[->++++++<]>+.++++++.>++++++++++[->++++++++++<]>+.>+++++++++++++++++++++++++++++++++++++++++++++++++++++++++[->++<]>.>++++++++[->++++++++++++++<]>.<<.<<.<<.>>.>>.",

            input: "11"

    };

    // === ИНИЦИАЛИЗАЦИЯ ===
    window.onload = () => {
        switchLanguage('en');
        initTape();
        updateUI();
        window.addEventListener('resize', () => moveArrowVisual(ptr));
        initAsciiTable();
        updateExamplesDropdown();
        updateCodeHighlight();
        updateMemoryMode();
    };

    function initTape() {
        const tapeEl = document.getElementById('tape');
        tapeEl.innerHTML = '';
        for (let i = 0; i < TAPE_SIZE; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            cell.innerHTML = `
                <div class="cell-top">
                    <span class="cell-index">${i}</span>
                    <span class="cell-ascii" id="ascii-${i}">␣</span>
                </div>
                <span class="cell-value" id="val-${i}">0</span>
            `;
            tapeEl.appendChild(cell);
        }
        const arrow = document.createElement('div');
        arrow.className = 'pointer-arrow';
        arrow.id = 'arrow';
        arrow.innerHTML = '▲';
        tapeEl.appendChild(arrow);
        setTimeout(() => moveArrowVisual(0), 50);
    }

    // === ЛОКАЛИЗАЦИЯ ===
    function toggleLanguage() {
        switchLanguage(currentLang === 'en' ? 'ru' : 'en');
    }

    function switchLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        
        document.getElementById('langBtn').innerText = lang === 'en' ? 'RU' : 'EN';
        document.getElementById('title').innerText = t.title;
        document.getElementById('hintsTitle').innerText = t.hintsTitle;
        document.getElementById('labelInput').innerText = t.labelInput;
        document.getElementById('labelOutput').innerText = t.labelOutput;
        document.getElementById('labelSpeed').innerText = t.labelSpeed;
        if(document.getElementById('asciiTitle')) {
            document.getElementById('asciiTitle').innerText = lang === 'en' ? "ASCII Table (0-127)" : "Таблица ASCII (0-127)";
        }
        
        document.getElementById('code').placeholder = t.placeholder;
        document.getElementById('inputBuffer').placeholder = t.placeholderInput;

        document.getElementById('btnRun').innerText = t.btnRun;
        document.getElementById('btnWait').innerText = t.btnWait;
        document.getElementById('btnContinue').innerText = t.btnContinue;
        document.getElementById('btnStepFwd').innerText = t.btnStepFwd;
        document.getElementById('btnStepBwd').innerText = t.btnStepBwd;
        document.getElementById('btnStop').innerText = t.btnStop;
        document.getElementById('btnClear').innerText = t.btnClear;
        document.getElementById('optBounded').innerText = t.optBounded;
        document.getElementById('optWrap').innerText = t.optWrap;
        const copyBtn = document.getElementById('btnCopy');
        if (copyBtn.innerText !== translations.en.btnCopied && copyBtn.innerText !== translations.ru.btnCopied) {
            copyBtn.innerText = t.btnCopy;
        }

        document.getElementById('execStatus').innerText = t.execStatus;

        updateExamplesDropdown();

        const grid = document.getElementById('hintGrid');
        grid.innerHTML = '';
        t.hints.forEach(h => {
            grid.innerHTML += `<div class="hint-item"><code>${h.cmd}</code> — ${h.desc}</div>`;
        });
        
        if (typeof initAsciiTable === 'function') initAsciiTable();
        updateCommandInfo();
        if (document.getElementById('labelTapeSize')) {
            document.getElementById('labelTapeSize').innerText = translations[lang].labelTapeSize;
        }
    }

    // === ПОДСВЕТКА КОДА ===
    function updateCodeHighlight() {
        const textarea = document.getElementById('code');
        const highlight = document.getElementById('codeHighlight');
        const code = textarea.value;
        
        let html = '';
        for (let i = 0; i < code.length; i++) {
            const char = code[i];
            const escaped = char === ' ' ? '&nbsp;' : escapeHTML(char);
            if (i === rawCodeIndex && isRunning && codeIndex < cleanCode.length) {
                html += `<span class="highlight-char">${escaped}</span>`;
            } else {
                html += escaped;
            }
        }
        highlight.innerHTML = html;
    }

    function syncHighlightScroll() {
        const textarea = document.getElementById('code');
        const highlight = document.getElementById('codeHighlight');
        highlight.scrollTop = textarea.scrollTop;
        highlight.scrollLeft = textarea.scrollLeft;
    }

    // === ОБНОВЛЕНИЕ ИНФОРМАЦИИ О КОМАНДЕ ===
    function updateCommandInfo() {
        const cmdIndexEl = document.getElementById('cmdIndex');
        const cmdCharEl = document.getElementById('cmdChar');
        const cmdDescEl = document.getElementById('cmdDesc');
        const t = translations[currentLang];
        
        if (isRunning && codeIndex < cleanCode.length && rawCodeIndex >= 0) {
            const cmd = cleanCode[codeIndex];
            const rawPos = rawCodeIndex + 1;
            cmdIndexEl.textContent = `#${rawPos}`;
            cmdCharEl.textContent = cmd;
            
            // Найти описание команды
            const hint = t.hints.find(h => h.cmd === cmd);
            cmdDescEl.textContent = hint ? hint.desc : '';
        } else {
            cmdIndexEl.textContent = '—';
            cmdCharEl.textContent = '␣';
            cmdDescEl.textContent = t.cmdWaiting;
        }
    }

    // === ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ===
    function updateUI() {
        for (let i = 0; i < TAPE_SIZE; i++) {
            const cell = document.getElementById(`cell-${i}`);
            const val = memory[i];
            document.getElementById(`val-${i}`).innerText = val;
            
            const asciiEl = document.getElementById(`ascii-${i}`);
            if (asciiEl) {
                let displayChar;
                let isPrintable = true;
                
                if (val >= 32 && val <= 126) {
                    displayChar = String.fromCharCode(val);
                } else if (val === 10) {
                    displayChar = 'LF';
                    isPrintable = false;
                } else if (val === 13) {
                    displayChar = 'CR';
                    isPrintable = false;
                } else if (val === 9) {
                    displayChar = 'TAB';
                    isPrintable = false;
                } else if (val === 32) {
                    displayChar = 'SP';
                    isPrintable = false;
                } else if (val === 0) {
                    displayChar = 'NUL';
                    isPrintable = false;
                } else if (val === 127) {
                    displayChar = 'DEL';
                    isPrintable = false;
                } else if (val < 32) {
                    displayChar = nonPrintableNames[val] || `^${String.fromCharCode(64 + val)}`;
                    isPrintable = false;
                } else {
                    displayChar = String.fromCharCode(val);
                }
                
                asciiEl.textContent = displayChar;
                asciiEl.className = 'cell-ascii' + (isPrintable ? '' : ' non-printable');
            }
            
            if (i === ptr) {
                cell.classList.add('active');
            } else {
                cell.classList.remove('active');
            }
        }
        moveArrowVisual(ptr);

        document.getElementById('btnRun').disabled = isRunning && !isPaused;
        document.getElementById('btnWait').disabled = !isRunning || isPaused;
        document.getElementById('btnContinue').disabled = !isRunning || !isPaused;
        document.getElementById('btnStepFwd').disabled = isRunning && !isPaused;
        document.getElementById('btnStepBwd').disabled = history.length === 0;
        document.getElementById('code').disabled = isRunning;
        
        const statusEl = document.getElementById('execStatus');
        if (isRunning && !isPaused && parseInt(document.getElementById('speed').value) === 0) {
            statusEl.classList.add('active');
        } else {
            statusEl.classList.remove('active');
        }

        updateCommandInfo();
        updateCodeHighlight();
    }

    function moveArrowVisual(index) {
        const cell = document.getElementById(`cell-${index}`);
        const arrow = document.getElementById('arrow');
        if (cell && arrow) {
            arrow.style.left = `${cell.offsetLeft + (cell.offsetWidth / 2)}px`;
        }
    }

    function escapeHTML(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function updateSpeed() {
        const speed = parseInt(document.getElementById('speed').value);
        document.getElementById('speedVal').innerText = speed;
        
        if (isRunning && !isPaused && speed > 0) {
            clearInterval(timer);
            const ms = Math.round(1000 / Math.pow(speed, 1.8)); 
            timer = setInterval(() => executeStep(true), ms);
        }
        updateUI();
    }

    function saveHistory() {
        history.push({
            memory: [...memory],
            ptr: ptr,
            codeIndex: codeIndex,
            rawCodeIndex: rawCodeIndex,
            output: document.getElementById('output').value,
            inputIndex: inputIndex
        });
    }

    function prepareExecution() {
        const rawCode = document.getElementById('code').value;
        const validCmds = ['>', '<', '+', '-', '.', ',', '[', ']'];
        
        cleanCode = "";
        mapToRawIndex = [];
        
        for (let i = 0; i < rawCode.length; i++) {
            if (validCmds.includes(rawCode[i])) {
                cleanCode += rawCode[i];
                mapToRawIndex.push(i);
            }
        }
    }

    // === ОСНОВНАЯ ЛОГИКА ===
    function executeStep(updateUI_ = true) {
        if (codeIndex >= cleanCode.length) {
            stopCode();
            return false;
        }

        if (updateUI_) saveHistory();
        rawCodeIndex = mapToRawIndex[codeIndex];
        const cmd = cleanCode[codeIndex];
        const inputs = document.getElementById('inputBuffer').value;
        
        switch (cmd) {
            case '>':
                if (ptr < TAPE_SIZE - 1) {
                    ptr++;
                } else if (memoryMode === "wrap") {
                    ptr = 0; // Если "wrap", прыгаем в начало ленты
                }
                // Если "bounded", ptr просто остаётся равен TAPE_SIZE - 1
                codeIndex++;
                break;
            case '<':
                if (ptr > 0) {
                    ptr--;
                } else if (memoryMode === "wrap") {
                    ptr = TAPE_SIZE - 1; // Если "wrap", прыгаем в самый конец ленты
                }
                // Если "bounded", ptr просто остаётся равен 0
                codeIndex++;
                break;
            case '+':
                memory[ptr] = (memory[ptr] + 1) % 256;
                codeIndex++;
                break;
            case '-':
                memory[ptr] = (memory[ptr] - 1 + 256) % 256;
                codeIndex++;
                break;
            case '.':
                document.getElementById('output').value += String.fromCharCode(memory[ptr]);
                codeIndex++;
                break;
            case ',':
                if (inputIndex < inputs.length) {
                    memory[ptr] = inputs.charCodeAt(inputIndex) % 256;
                    inputIndex++;
                } else {
                    memory[ptr] = 0;
                }
                codeIndex++;
                break;
            case '[':
                if (memory[ptr] === 0) {
                    let count = 1;
                    while (count > 0) {
                        codeIndex++;
                        if (codeIndex >= cleanCode.length) { 
                            stopCode(); 
                            return false; 
                        }
                        if (cleanCode[codeIndex] === '[') count++;
                        if (cleanCode[codeIndex] === ']') count--;
                    }
                    codeIndex++;
                } else {
                    codeIndex++;
                }
                break;
            case ']':
                if (memory[ptr] !== 0) {
                    let count = 1;
                    while (count > 0) {
                        codeIndex--;
                        if (codeIndex < 0) { 
                            stopCode(); 
                            return false; 
                        }
                        if (cleanCode[codeIndex] === ']') count++;
                        if (cleanCode[codeIndex] === '[') count--;
                    }
                } else {
                    codeIndex++;
                }
                break;
            default:
                codeIndex++;
                break;
        }

        if (updateUI_ && codeIndex < cleanCode.length) {
            rawCodeIndex = mapToRawIndex[codeIndex];
        }

        if (updateUI_) {
            updateUI();
        }
        return true;
    }

    function executeAllStepsInstant() {
        while (isRunning && !isPaused && !isStopped && codeIndex < cleanCode.length) {
            executeStep(false);
        }
        
        if (codeIndex >= cleanCode.length || isStopped) {
            if (history.length === 0 || history[history.length - 1].codeIndex !== codeIndex) {
                saveHistory();
            }
        }
        
        updateUI();
        
        if (codeIndex >= cleanCode.length) {
            stopCode();
        }
    }

    // === УПРАВЛЕНИЕ ===
    async function runCode() {
        if (!isRunning) {
            prepareExecution();
            if (cleanCode.length === 0) return;
            
            memory.fill(0);
            ptr = 0;
            codeIndex = 0;
            rawCodeIndex = mapToRawIndex[0] || -1;
            inputIndex = 0;
            history = [];
            document.getElementById('output').value = "";
            isRunning = true;
            isStopped = false;
        }
        
        isPaused = false;
        const speed = parseInt(document.getElementById('speed').value);
        
        if (speed === 0) {
            clearInterval(timer);
            executeAllStepsInstant();
        } else {
            clearInterval(timer);
            const ms = Math.round(1000 / Math.pow(speed, 1.8));
            timer = setInterval(() => executeStep(true), ms);
            updateUI();
        }
    }

    function waitCode() {
        isPaused = true;
        clearInterval(timer);
        updateUI();
    }

    function continueCode() {
        runCode();
    }

    function stopCode() {
        isRunning = false;
        isPaused = false;
        isStopped = true;
        clearInterval(timer);
        if (codeIndex >= cleanCode.length) {
            codeIndex = 0;
            rawCodeIndex = -1;
        }
        updateUI();
    }

    function stepForward() {
        if (!isRunning) {
            prepareExecution();
            if (cleanCode.length === 0) return;
            memory.fill(0);
            ptr = 0;
            codeIndex = 0;
            rawCodeIndex = mapToRawIndex[0] || -1;
            inputIndex = 0;
            history = [];
            document.getElementById('output').value = "";
            isRunning = true;
            isStopped = false;
        }
        
        isPaused = true;
        clearInterval(timer);
        executeStep(true);
    }

    function stepBackward() {
        if (history.length === 0) return;
        isPaused = true;
        clearInterval(timer);

        const prevState = history.pop();
        memory = prevState.memory;
        ptr = prevState.ptr;
        codeIndex = prevState.codeIndex;
        rawCodeIndex = prevState.rawCodeIndex;
        document.getElementById('output').value = prevState.output;
        inputIndex = prevState.inputIndex;

        updateUI();
    }

    // === ASCII ТАБЛИЦА ===
    function initAsciiTable() {
        const container = document.getElementById('asciiContainer');
        const openGroups = Array.from(container.querySelectorAll('.ascii-group.open')).map(g => g.dataset.id);
        
        container.innerHTML = '';

        const groups = [
            { id: 'ctrl', min: 0, max: 31, nameRu: '0-31: Управляющие символы', nameEn: '0-31: Control Characters' },
            { id: 'space_punct', min: 32, max: 47, nameRu: '32-47: Пробел и Знаки препинания', nameEn: '32-47: Space & Punctuation' },
            { id: 'digits', min: 48, max: 57, nameRu: '48-57: Цифры', nameEn: '48-57: Digits' },
            { id: 'punct2', min: 58, max: 64, nameRu: '58-64: Знаки препинания', nameEn: '58-64: Punctuation' },
            { id: 'uppercase', min: 65, max: 90, nameRu: '65-90: Заглавные латинские буквы', nameEn: '65-90: Uppercase Letters' },
            { id: 'punct3', min: 91, max: 96, nameRu: '91-96: Знаки препинания', nameEn: '91-96: Punctuation' },
            { id: 'lowercase', min: 97, max: 122, nameRu: '97-122: Строчные латинские буквы', nameEn: '97-122: Lowercase Letters' },
            { id: 'punct4', min: 123, max: 127, nameRu: '123-127: Спецсимволы', nameEn: '123-127: Special Characters' }
        ];

        const specialNames = {
            0: 'NUL', 7: 'BEL', 8: 'BS', 9: 'TAB', 10: 'LF', 13: 'CR', 27: 'ESC', 32: 'Space', 127: 'DEL'
        };

        groups.forEach(g => {
            const groupEl = document.createElement('div');
            groupEl.className = 'ascii-group';
            groupEl.dataset.id = g.id;
            if (openGroups.includes(g.id)) groupEl.classList.add('open');

            const header = document.createElement('div');
            header.className = 'ascii-group-header';
            header.innerHTML = `<span>${currentLang === 'ru' ? g.nameRu : g.nameEn}</span><span>▾</span>`;
            
            header.onclick = () => {
                groupEl.classList.toggle('open');
            };

            const content = document.createElement('div');
            content.className = 'ascii-group-content';

            for (let i = g.min; i <= g.max; i++) {
                let charText = specialNames[i] || String.fromCharCode(i);
                
                const item = document.createElement('div');
                item.className = 'ascii-item';
                item.innerHTML = `<span class="ascii-code">#${i}</span><span class="ascii-char">${escapeHTML(charText)}</span>`;
                content.appendChild(item);
            }

            groupEl.appendChild(header);
            groupEl.appendChild(content);
            container.appendChild(groupEl);
        });
    }

    // === ПРИМЕРЫ ===
    function updateExamplesDropdown() {
        const select = document.getElementById('exampleSelect');
        const selectedValue = select.value;
        const t = translations[currentLang];
        
        select.innerHTML = `<option value="">${t.examplePlaceholder}</option>`;
        select.innerHTML += `<option value="hello">${t.examples.hello}</option>`;
        select.innerHTML += `<option value="add">${t.examples.add}</option>`;
        select.innerHTML += `<option value="cat">${t.examples.cat}</option>`;
        select.innerHTML += `<option value="sixseven">${t.examples.sixseven}</option>`;
        select.innerHTML += `<option value="loopdoub">${t.examples.loopdoub}</option>`;
        select.innerHTML += `<option value="thisurl">${t.examples.thisurl}</option>`;
        select.innerHTML += `<option value="logicn">${t.examples.logicn}</option>`;
        select.value = selectedValue;
    }

    function loadExample() {
        const exKey = document.getElementById('exampleSelect').value;
        if (!exKey || !bfkExamples[exKey]) return;
        
        stopCode();
        
        document.getElementById('code').value = bfkExamples[exKey].code;
        document.getElementById('inputBuffer').value = bfkExamples[exKey].input;
        document.getElementById('output').value = "";
        
        updateUI();
    }

    function clearAll() {
        stopCode();
        document.getElementById('code').value = "";
        document.getElementById('inputBuffer').value = "";
        document.getElementById('output').value = "";
        document.getElementById('exampleSelect').value = "";
        
        memory.fill(0);
        ptr = 0;
        history = [];
        updateUI();
    }

    function copyOutput() {
        const outputText = document.getElementById('output').value;
        if (!outputText) return;

        navigator.clipboard.writeText(outputText).then(() => {
            const copyBtn = document.getElementById('btnCopy');
            const originalText = translations[currentLang].btnCopy;
            
            copyBtn.innerText = translations[currentLang].btnCopied;
            copyBtn.style.background = "#a6e3a1";
            copyBtn.style.color = "#11111b";

            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.background = "";
                copyBtn.style.color = "";
            }, 1500);
        });
    }
</script>
