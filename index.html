<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainfuck Visualizer</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #252538;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --active-color: #f38ba8;
            --border-color: #45475a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--accent-color); }

        button.lang-btn {
            background: var(--border-color);
            color: var(--text-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Лента ячеек памяти */
        .tape-container {
            overflow-x: auto;
            background: #181825;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .tape {
            display: flex;
            gap: 8px;
            position: relative;
            padding-bottom: 25px; /* Место для стрелочки */
        }

        .cell {
            min-width: 50px;
            height: 50px;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            position: relative;
            transition: all 0.2s;
        }

        .cell.active {
            border-color: var(--active-color);
            box-shadow: 0 0 10px rgba(243, 139, 168, 0.5);
        }

        .cell-index {
            font-size: 10px;
            color: #6c7086;
            position: absolute;
            top: 2px;
        }

        .cell-value {
            font-weight: bold;
            margin-top: 10px;
        }

        .pointer-arrow {
            position: absolute;
            bottom: 0;
            font-size: 20px;
            color: var(--active-color);
            transition: left 0.2s ease;
            transform: translateX(-50%);
        }

        /* Редактор и код */
        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .code-container {
            position: relative;
            background: #181825;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* Скрытый слой для подсветки активной команды */
        .highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: transparent;
            pointer-events: none;
        }

        .highlight-layer .active-cmd {
            background-color: rgba(137, 180, 250, 0.4);
            border-radius: 3px;
            color: transparent;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: transparent;
            color: var(--text-color);
            border: none;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 16px;
            resize: vertical;
            outline: none;
            position: relative;
            z-index: 1;
        }

        /* Панель управления */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-run { background: #a6e3a1; color: #11111b; }
        .btn-stop { background: #f38ba8; color: #11111b; }
        .btn-step { background: #89b4fa; color: #11111b; }
        .btn-wait { background: #f9e2af; color: #11111b; }
        
        .btn:disabled {
            background: #585b70;
            color: #a6adc8;
            cursor: not-allowed;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #181825;
            padding: 5px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        /* Идеально ровный Ввод и Вывод */
        .io-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .io-field {
            display: flex;
            flex-direction: column;
        }
        .io-field label {
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .io-field textarea {
            width: 100%;
            height: 80px; /* Фиксированная одинаковая высота */
            background: #181825;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            resize: none; /* Запрещаем растягивать вручную, чтобы не ломать симметрию */
            outline: none;
            transition: border-color 0.2s;
        }
        .io-field textarea:focus {
            border-color: var(--accent-color);
        }
        /* Подсказки */
        .hints {
            background: #181825;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .hints h3 { margin-top: 0; color: var(--accent-color); }

        .hint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            font-size: 14px;
        }

        .hint-item code {
            background: var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--active-color);
            font-weight: bold;
        }
                .ascii-group {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .ascii-group-header {
            background: #2a2a3f;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .ascii-group-header:hover {
            background: #313149;
        }

        .ascii-group-content {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 6px;
            padding: 12px;
            background: #14141f;
            border-top: 1px solid var(--border-color);
        }

        .ascii-group.open .ascii-group-content {
            display: grid;
        }

        .ascii-item {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px;
            text-align: center;
            font-size: 13px;
        }

        .ascii-code {
            color: #6c7086;
            font-size: 11px;
            display: block;
        }

        .ascii-char {
            font-weight: bold;
            color: var(--active-color);
            font-family: monospace;
            font-size: 15px;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="title">Brainfuck Visualizer</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="exampleSelect" onchange="loadExample()" style="background: var(--border-color); color: var(--text-color); border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; outline: none;">
                <!-- Варианты добавятся через JavaScript -->
            </select>
            <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">RU</button>
        </div>
    </header>


    <!-- Визуальная лента -->
    <div class="tape-container">
        <div class="tape" id="tape">
            <!-- Ячейки сгенерируются через JS -->
        </div>
    </div>

    <!-- Редактор кода -->
    <div class="workspace">
        <div class="code-container">
            <div class="highlight-layer" id="highlightLayer"></div>
            <textarea id="code" oninput="syncHighlight()" placeholder="Введите Brainfuck код сюда... Например: ++++++++[>++++[>++>+++>+++>+<<<<-]>+>+>->>+[<]<-]>>.>---.+++++++..+++.>>.<-.<.+++.------.--------.>>+.>++."></textarea>
        </div>
    </div>

    <!-- Кнопки управления -->
    <div class="controls">
        <button class="btn btn-run" id="btnRun" onclick="runCode()">Run</button>
        <button class="btn btn-wait" id="btnWait" onclick="waitCode()" disabled>Wait</button>
        <button class="btn btn-run" id="btnContinue" onclick="continueCode()" disabled>Continue</button>
        <button class="btn btn-step" id="btnStepFwd" onclick="stepForward()">+ Step</button>
        <button class="btn btn-step" id="btnStepBwd" onclick="stepBackward()" disabled>- Step</button>
        <button class="btn btn-stop" id="btnStop" onclick="stopCode()">Stop</button>
        <button class="btn" id="btnClear" onclick="clearAll()" style="background: #45475a; color: var(--text-color);">Clear</button>

        <div class="speed-control">
            <span id="labelSpeed">Скорость:</span>
            <input type="range" id="speed" min="0" max="10" value="5" onchange="updateSpeed()">
            <span id="speedVal">5</span>
        </div>
    </div>


    <!-- Ввод / Вывод -->
    <div class="io-panel">
        <div class="io-field">
            <label id="labelInput">Ввод (для команды ','):</label>
            <textarea id="inputBuffer" placeholder="Символы для команды ','"></textarea>
        </div>
        <div class="io-field">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label id="labelOutput" style="margin-bottom: 0;">Вывод:</label>
                <button id="btnCopy" onclick="copyOutput()" style="background: var(--border-color); color: var(--text-color); border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; transition: background 0.2s;">Copy</button>
            </div>
            <textarea id="output" readonly></textarea>
        </div>
    </div>

    <!-- Панель подсказок -->
    <div class="hints">
        <h3 id="hintsTitle">Справка по командам</h3>
        <div class="hint-grid" id="hintGrid">
            <!-- Подсказки зависят от языка -->
        </div>
    </div>
</div>
    <!-- Панель ASCII таблицы -->
    <div class="hints" style="margin-top: 20px;">
        <h3 id="asciiTitle">Таблица ASCII (0-127)</h3>
        <div id="asciiContainer">
            <!-- Группы сгенерируются через JavaScript -->
        </div>
    </div>

<script>
    // Обновленные настройки и локализация
    let currentLang = 'en';
    const translations = {
        en: {
            title: "Brainfuck Visualizer",
            hintsTitle: "Command Reference",
            labelInput: "Input (passed to ',')",
            placeholderInput: "Characters for ',' command",
            labelOutput: "Output:",
            labelSpeed: "Speed:",
            placeholder: "Enter Brainfuck code here...",
            btnRun: "Run",
            btnWait: "Wait",
            btnContinue: "Continue",
            btnStepFwd: "+ Step",
            btnStepBwd: "- Step",
            btnStop: "Stop",
            btnClear: "Clear",
            btnCopy: "Copy",
            btnCopied: "Copied!",
            examplePlaceholder: "— Choose Example —",
            examples: {
                hello: "Hello World!",
                add: "Adding two digits (1+2)",
                cat: "Cat program (Echo input)",
                sixseven: "SIXSEVEN",
                loopdoub: "Looping Doubler",
                thisurl: "URL of this site"
            },
            hints: [
                { cmd: '>', desc: 'Move pointer right' },
                { cmd: '<', desc: 'Move pointer left' },
                { cmd: '+', desc: 'Increment cell value' },
                { cmd: '-', desc: 'Decrement cell value' },
                { cmd: '.', desc: 'Output current cell as ASCII' },
                { cmd: ',', desc: 'Input char into current cell' },
                { cmd: '[', desc: 'Jump forward if cell is 0' },
                { cmd: ']', desc: 'Jump back if cell is not 0' }
            ]
        },
        ru: {
            title: "Визуализатор Brainfuck",
            hintsTitle: "Справка по командам",
            labelInput: "Ввод (для команды ',')",
            placeholderInput: "Символы для команды ','",
            labelOutput: "Вывод:",
            labelSpeed: "Скорость:",
            placeholder: "Введите Brainfuck код сюда...",
            btnRun: "Запуск",
            btnWait: "Пауза",
            btnContinue: "Продолжить",
            btnStepFwd: "Шаг +",
            btnStepBwd: "Шаг -",
            btnStop: "Стоп",
            btnClear: "Стереть",
            btnCopy: "Копировать",
            btnCopied: "Скопировано!",
            examplePlaceholder: "— Выберите пример —",
            examples: {
                hello: "Привет, мир! (Hello World)",
                add: "Сложение двух цифр (1+2)",
                cat: "Программа-эхо (Вывод ввода)",
                sixseven: "SIXSEVEN",
                loopdoub: "Циклический удвоитель",
                thisurl: "URL этого сайта"
            },
            hints: [
                { cmd: '>', desc: 'Сдвинуть указатель вправо' },
                { cmd: '<', desc: 'Сдвинуть указатель влево' },
                { cmd: '+', desc: 'Увеличить значение в ячейке' },
                { cmd: '-', desc: 'Уменьшить значение в ячейке' },
                { cmd: '.', desc: 'Вывести значение как ASCII символ' },
                { cmd: ',', desc: 'Считать символ из ввода в ячейку' },
                { cmd: '[', desc: 'Перейти вперёд за ] если в ячейке 0' },
                { cmd: ']', desc: 'Вернуться назад к [ если в ячейке не 0' }
            ]
        }
    };

    // Состояние интерпретатора
    const TAPE_SIZE = 30;
    let memory = new Array(TAPE_SIZE).fill(0);
    let ptr = 0;
    let codeIndex = 0;      // Индекс в отфильтрованном массиве команд cleanCode
    let rawCodeIndex = -1;  // Индекс в исходном тексте textarea для подсветки
    let isRunning = false;
    let isPaused = false;
    let timer = null;
    let inputIndex = 0;

    // Массивы для обработанного кода и маппинга индексов
    let cleanCode = "";
    let mapToRawIndex = [];

    // История для шага назад (- Step)
    let history = [];
    // База данных примеров кода Brainfuck
    const bfkExamples = {
        hello: {
            code: "++++++++[>++++[>++>+++>+++>+<<<<-]>+>+>->>+[<]<-]>>.>---.+++++++..+++.>>.<-.<.+++.------.--------.>>+.>++.",
            input: "Hello"
        },
        add: {
            code: ",>++++++[<-------->-],>++++++[<-------->-]<[->+<]>.+",
            input: "12"
        },
        cat: {
            code: ",[.,]",
            input: "Brainfuck"
        },
        sixseven: {
            code: "++++++++++[->++++++++<]>[->+>+>+>+>+>+<<<<<<]>+++.>-------.>++++++++.<<.>>>-----------.>++++++.<.>>--.",
            input: "SIXSEVEN"
        },
        loopdoub: {
            code: "+        adds 1 to enter the loop (прибавляет 1 для входа в цикл)\n[>,]     reads all characters and writes them into cells (читает все символы и записывает в ячейки)\n<[-<]    subtracts 1 from all cells to get rid of cell 0 (вычитает 1 во всех ячейках чтобы избавиться от ячейки 0)\n>[+..>]  adds 1, prints 2 times and moves on (прибавляет 1, печатает 2 раза и идет дальше)",
            input: "Puk Puk"
        },
        thisurl: {
            code: "++++++++++[->++++++++++<]>++++.<+++[->++++<]>..----.+++.<+++[->-------------------<]>.-----------..<+++++++[->++++++++++<]>+.-------------.++.+++++++++.-----.+++.<+++[->-----<]>.+++++.-------.++++++++++++.+++.-------.++++++.-.<++++++++[->--------<]>.>++++++++++[->++++++++++<]>+++.++.+++++++++++.------------.+++++++++++++.<+++++[->----<]>+.<<.>>+++++++.++++++.<<+.>+++++[->---------<]>.<++++++[->++++++++<]>.<+++++[->---<]>--.++++++++.+++++.--------.<+++++[->+++<]>.<++++++[->---<]>.++++++++.<+++++++++++++++++[->--<]>.<++++++[->++++++<]>+.++++++.>++++++++++[->++++++++++<]>+.>+++++++++++++++++++++++++++++++++++++++++++++++++++++++++[->++<]>.>++++++++[->++++++++++++++<]>.<<.<<.<<.>>.>>.",
            input: "https://viktorchampion.github.io/BrainfuckInterpreter"
        }
    };

    // Инициализация при загрузке
    window.onload = () => {
        switchLanguage('en');
        initTape();
        updateUI();
        
        // Пересчитываем положение стрелочки при изменении размеров экрана
        window.addEventListener('resize', () => moveArrowVisual(ptr));
        initAsciiTable();
        updateExamplesDropdown();

    };

    function initTape() {
        const tapeEl = document.getElementById('tape');
        tapeEl.innerHTML = '';
        for (let i = 0; i < TAPE_SIZE; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            cell.innerHTML = `<span class="cell-index">${i}</span><span class="cell-value" id="val-${i}">0</span>`;
            tapeEl.appendChild(cell);
        }
        const arrow = document.createElement('div');
        arrow.className = 'pointer-arrow';
        arrow.id = 'arrow';
        arrow.innerHTML = '▲';
        tapeEl.appendChild(arrow);
        setTimeout(() => moveArrowVisual(0), 50);
    }

    // Локализация
    function toggleLanguage() {
        switchLanguage(currentLang === 'en' ? 'ru' : 'en');
    }

    function switchLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        
        // Перевод шапки и лейблов
        document.getElementById('langBtn').innerText = lang === 'en' ? 'RU' : 'EN';
        document.getElementById('title').innerText = t.title;
        document.getElementById('hintsTitle').innerText = t.hintsTitle;
        document.getElementById('labelInput').innerText = t.labelInput;
        document.getElementById('labelOutput').innerText = t.labelOutput;
        document.getElementById('labelSpeed').innerText = t.labelSpeed;
        if(document.getElementById('asciiTitle')) {
            document.getElementById('asciiTitle').innerText = lang === 'en' ? "ASCII Table (0-127)" : "Таблица ASCII (0-127)";
        }
        
        // Перевод плейсхолдеров
        document.getElementById('code').placeholder = t.placeholder;
        document.getElementById('inputBuffer').placeholder = t.placeholderInput;

        // Перевод всех кнопок управления
        document.getElementById('btnRun').innerText = t.btnRun;
        document.getElementById('btnWait').innerText = t.btnWait;
        document.getElementById('btnContinue').innerText = t.btnContinue;
        document.getElementById('btnStepFwd').innerText = t.btnStepFwd;
        document.getElementById('btnStepBwd').innerText = t.btnStepBwd;
        document.getElementById('btnStop').innerText = t.btnStop;
        document.getElementById('btnClear').innerText = t.btnClear;
        
        // Кнопку копирования переводим, только если она сейчас не в состоянии "Copied!"
        const copyBtn = document.getElementById('btnCopy');
        if (copyBtn.innerText !== translations.en.btnCopied && copyBtn.innerText !== translations.ru.btnCopied) {
            copyBtn.innerText = t.btnCopy;
        }

        // Перерисовка выпадающего списка примеров
        updateExamplesDropdown();

        // Перевод нижней таблицы подсказок
        const grid = document.getElementById('hintGrid');
        grid.innerHTML = '';
        t.hints.forEach(h => {
            grid.innerHTML += `<div class="hint-item"><code>${h.cmd}</code> — ${h.desc}</div>`;
        });
        
        if (typeof initAsciiTable === 'function') initAsciiTable();
    }

    // Визуальное обновление интерфейса и кнопок
    function updateUI() {
        // Синхронизация значений памяти
        for (let i = 0; i < TAPE_SIZE; i++) {
            const cell = document.getElementById(`cell-${i}`);
            document.getElementById(`val-${i}`).innerText = memory[i];
            if (i === ptr) {
                cell.classList.add('active');
            } else {
                cell.classList.remove('active');
            }
        }
        moveArrowVisual(ptr);
        syncHighlight();

        // Корректное переключение доступности кнопок (убирает залипание)
        document.getElementById('btnRun').disabled = isRunning && !isPaused;
        document.getElementById('btnWait').disabled = !isRunning || isPaused;
        document.getElementById('btnContinue').disabled = !isRunning || !isPaused;
        document.getElementById('btnStepFwd').disabled = isRunning && !isPaused;
        document.getElementById('btnStepBwd').disabled = history.length === 0;
        document.getElementById('code').disabled = isRunning;
    }

    function moveArrowVisual(index) {
        const cell = document.getElementById(`cell-${index}`);
        const arrow = document.getElementById('arrow');
        if (cell && arrow) {
            arrow.style.left = `${cell.offsetLeft + (cell.offsetWidth / 2)}px`;
        }
    }

    function syncHighlight() {
        const codeText = document.getElementById('code').value;
        const layer = document.getElementById('highlightLayer');
        
        if (isRunning && rawCodeIndex >= 0 && rawCodeIndex < codeText.length) {
            const before = codeText.substring(0, rawCodeIndex);
            const char = codeText.charAt(rawCodeIndex);
            const after = codeText.substring(rawCodeIndex + 1);
            layer.innerHTML = escapeHTML(before) + `<span class="active-cmd">${escapeHTML(char)}</span>` + escapeHTML(after);
        } else {
            layer.innerHTML = escapeHTML(codeText);
        }
    }

    function escapeHTML(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function updateSpeed() {
        const speed = parseInt(document.getElementById('speed').value);
        document.getElementById('speedVal').innerText = speed;
        
        if (isRunning && !isPaused && speed > 0) {
            clearInterval(timer);
            // Чем выше ползунок, тем меньше задержка (быстрее работа)
            // 1 = 1000мс (медленно), 10 = 15мс (очень быстро)
            const ms = Math.round(1000 / Math.pow(speed, 1.8)); 
            timer = setInterval(executeStep, ms);
        }
    }

    // Сохранение состояния для Шага Назад
    function saveHistory() {
        history.push({
            memory: [...memory],
            ptr: ptr,
            codeIndex: codeIndex,
            rawCodeIndex: rawCodeIndex,
            output: document.getElementById('output').value,
            inputIndex: inputIndex
        });
    }

    // Подготовка кода к выполнению
    function prepareExecution() {
        const rawCode = document.getElementById('code').value;
        const validCmds = ['>', '<', '+', '-', '.', ',', '[', ']'];
        
        cleanCode = "";
        mapToRawIndex = [];
        
        for (let i = 0; i < rawCode.length; i++) {
            if (validCmds.includes(rawCode[i])) {
                cleanCode += rawCode[i];
                mapToRawIndex.push(i);
            }
        }
    }

    // Выполнение одной команды
    function executeStep() {
        if (codeIndex >= cleanCode.length) {
            stopCode();
            return;
        }

        saveHistory();
        rawCodeIndex = mapToRawIndex[codeIndex];
        const cmd = cleanCode[codeIndex];
        const inputs = document.getElementById('inputBuffer').value;

        switch (cmd) {
            case '>':
                if (ptr < TAPE_SIZE - 1) ptr++;
                codeIndex++;
                break;
            case '<':
                if (ptr > 0) ptr--;
                codeIndex++;
                break;
            case '+':
                memory[ptr] = (memory[ptr] + 1) % 256;
                codeIndex++;
                break;
            case '-':
                memory[ptr] = (memory[ptr] - 1 + 256) % 256;
                codeIndex++;
                break;
            case '.':
                document.getElementById('output').value += String.fromCharCode(memory[ptr]);
                codeIndex++;
                break;
            case ',':
                if (inputIndex < inputs.length) {
                    memory[ptr] = inputs.charCodeAt(inputIndex) % 256;
                    inputIndex++;
                } else {
                    memory[ptr] = 0;
                }
                codeIndex++;
                break;
            case '[':
                if (memory[ptr] === 0) {
                    let count = 1;
                    while (count > 0) {
                        codeIndex++;
                        if (codeIndex >= cleanCode.length) { stopCode(); return; }
                        if (cleanCode[codeIndex] === '[') count++;
                        if (cleanCode[codeIndex] === ']') count--;
                    }
                    codeIndex++;
                } else {
                    codeIndex++;
                }
                break;
            case ']':
                if (memory[ptr] !== 0) {
                    let count = 1;
                    while (count > 0) {
                        codeIndex--;
                        if (codeIndex < 0) { stopCode(); return; }
                        if (cleanCode[codeIndex] === ']') count++;
                        if (cleanCode[codeIndex] === '[') count--;
                    }
                } else {
                    codeIndex++;
                }
                break;
        }
        // Обновляем индекс следующей команды для синхронизации подсветки
        if (codeIndex < cleanCode.length) {
            rawCodeIndex = mapToRawIndex[codeIndex];
        }

        updateUI();
    }

    // Управление
    function runCode() {
        if (!isRunning) {
            prepareExecution();
            if (cleanCode.length === 0) return;
            
            memory.fill(0);
            ptr = 0;
            codeIndex = 0;
            rawCodeIndex = mapToRawIndex;
            inputIndex = 0;
            history = [];
            document.getElementById('output').value = "";
            isRunning = true;
        }
        
        isPaused = false;
        const speed = parseInt(document.getElementById('speed').value);
        
        if (speed === 0) {
            // Мгновенный цикл
            clearInterval(timer);
            while (isRunning && !isPaused && codeIndex < cleanCode.length) {
                executeStep();
            }
        } else {
            clearInterval(timer);
            // Рассчитываем ускоренную задержку по той же формуле
            const ms = Math.round(1000 / Math.pow(speed, 1.8)); 
            timer = setInterval(executeStep, ms);
            updateUI();
        }
    }

    function waitCode() {
        isPaused = true;
        clearInterval(timer);
        updateUI();
    }

    function continueCode() {
        runCode();
    }

    function stopCode() {
        isRunning = false;
        isPaused = false;
        clearInterval(timer);
        codeIndex = 0;
        rawCodeIndex = -1;
        updateUI();
    }

    function stepForward() {
        if (!isRunning) {
            prepareExecution();
            if (cleanCode.length === 0) return;
            memory.fill(0);
            ptr = 0;
            codeIndex = 0;
            rawCodeIndex = mapToRawIndex[0];
            inputIndex = 0;
            history = [];
            document.getElementById('output').value = "";
            isRunning = true;
        }
        
        isPaused = true;
        clearInterval(timer);
        executeStep();
    }

    function stepBackward() {
        if (history.length === 0) return;
        isPaused = true;
        clearInterval(timer);

        const prevState = history.pop();
        memory = prevState.memory;
        ptr = prevState.ptr;
        codeIndex = prevState.codeIndex;
        rawCodeIndex = prevState.rawCodeIndex;
        document.getElementById('output').value = prevState.output;
        inputIndex = prevState.inputIndex;

        updateUI();
    }
        function initAsciiTable() {
        const container = document.getElementById('asciiContainer');
        // Сохраняем состояние открытых групп, чтобы они не захлопывались при смене языка
        const openGroups = Array.from(container.querySelectorAll('.ascii-group.open')).map(g => g.dataset.id);
        
        container.innerHTML = '';

        // Описание диапазонов ASCII
        const groups = [
            { id: 'ctrl', min: 0, max: 31, nameRu: '0-31: Управляющие символы (Null, Enter, Tab...)', nameEn: '0-31: Control Characters (Null, Enter, Tab...)' },
            { id: 'space_punct', min: 32, max: 47, nameRu: '32-47: Пробел и Знаки препинания ( , !, ", #...)', nameEn: '32-47: Space & Punctuation ( , !, ", #...)' },
            { id: 'digits', min: 48, max: 57, nameRu: '48-57: Цифры (0-9)', nameEn: '48-57: Digits (0-9)' },
            { id: 'punct2', min: 58, max: 64, nameRu: '58-64: Знаки препинания (:, ;, <, =, >...)', nameEn: '58-64: Punctuation (:, ;, <, =, >...)' },
            { id: 'uppercase', min: 65, max: 90, nameRu: '65-90: Заглавные латинские буквы (A-Z)', nameEn: '65-90: Uppercase Letters (A-Z)' },
            { id: 'punct3', min: 91, max: 96, nameRu: '91-96: Знаки препинания ([, \\, ], ^...)', nameEn: '91-96: Punctuation ([, \\, ], ^...)' },
            { id: 'lowercase', min: 97, max: 122, nameRu: '97-122: Строчные латинские буквы (a-z)', nameEn: '97-122: Lowercase Letters (a-z)' },
            { id: 'punct4', min: 123, max: 127, nameRu: '123-127: Спецсимволы ({, |, }, ~, Delete)', nameEn: '123-127: Special Characters ({, |, }, ~, Delete)' }
        ];

        // Названия для невидимых/управляющих символов
        const specialNames = {
            0: 'NUL', 7: 'BEL', 8: 'BS', 9: 'TAB', 10: 'LF', 13: 'CR', 27: 'ESC', 32: 'Space', 127: 'DEL'
        };

        groups.forEach(g => {
            const groupEl = document.createElement('div');
            groupEl.className = 'ascii-group';
            groupEl.dataset.id = g.id;
            if (openGroups.includes(g.id)) groupEl.classList.add('open');

            const header = document.createElement('div');
            header.className = 'ascii-group-header';
            header.innerHTML = `<span>${currentLang === 'ru' ? g.nameRu : g.nameEn}</span><span>▾</span>`;
            
            header.onclick = () => {
                groupEl.classList.toggle('open');
            };

            const content = document.createElement('div');
            content.className = 'ascii-group-content';

            for (let i = g.min; i <= g.max; i++) {
                let charText = specialNames[i] || String.fromCharCode(i);
                
                const item = document.createElement('div');
                item.className = 'ascii-item';
                item.innerHTML = `<span class="ascii-code">#${i}</span><span class="ascii-char">${escapeHTML(charText)}</span>`;
                content.appendChild(item);
            }

            groupEl.appendChild(header);
            groupEl.appendChild(content);
            container.appendChild(groupEl);
        });
    }
    // Динамическое обновление выпадающего списка примеров
    function updateExamplesDropdown() {
        const select = document.getElementById('exampleSelect');
        const selectedValue = select.value; // Сохраняем выбранное значение при смене языка
        const t = translations[currentLang];
        
        select.innerHTML = `<option value="">${t.examplePlaceholder}</option>`;
        select.innerHTML += `<option value="hello">${t.examples.hello}</option>`;
        select.innerHTML += `<option value="add">${t.examples.add}</option>`;
        select.innerHTML += `<option value="cat">${t.examples.cat}</option>`;
        select.innerHTML += `<option value="sixseven">${t.examples.sixseven}</option>`;
        select.innerHTML += `<option value="loopdoub">${t.examples.loopdoub}</option>`;
        select.innerHTML += `<option value="thisurl">${t.examples.thisurl}</option>`;
        select.value = selectedValue;
    }

    // Загрузка выбранного примера в редактор
    function loadExample() {
        const exKey = document.getElementById('exampleSelect').value;
        if (!exKey || !bfkExamples[exKey]) return;
        
        stopCode(); // Сбрасываем интерпретатор, если программа бежала
        
        document.getElementById('code').value = bfkExamples[exKey].code;
        document.getElementById('inputBuffer').value = bfkExamples[exKey].input;
        document.getElementById('output').value = "";
        
        syncHighlight();
    }

    // Полная очистка рабочей области
    function clearAll() {
        stopCode();
        document.getElementById('code').value = "";
        document.getElementById('inputBuffer').value = "";
        document.getElementById('output').value = "";
        document.getElementById('exampleSelect').value = "";
        
        // Сбрасываем память визуализатора
        memory.fill(0);
        ptr = 0;
        history = [];
        updateUI();
    }

    // Идеальное копирование вывода в буфер обмена
    function copyOutput() {
        const outputText = document.getElementById('output').value;
        if (!outputText) return;

        navigator.clipboard.writeText(outputText).then(() => {
            const copyBtn = document.getElementById('btnCopy');
            const originalText = translations[currentLang].btnCopy;
            
            copyBtn.innerText = translations[currentLang].btnCopied;
            copyBtn.style.background = "#a6e3a1"; // Подсветим зелёным для перфекционизма
            copyBtn.style.color = "#11111b";

            // Возвращаем исходный текст кнопки через 1.5 секунды
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.background = "";
                copyBtn.style.color = "";
            }, 1500);
        });
    }
